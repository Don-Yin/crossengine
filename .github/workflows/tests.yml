name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: set up python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: install dependencies
        run: |
          pip install -e ".[dev]"
          pip install bt vectorbt backtrader cvxportfolio

      - name: run tests with coverage
        run: python -m pytest tests/ -v --cov=crossengine --cov-report=xml --cov-report=term --ignore=tests/test_e2e_full.py --ignore=tests/test_e2e_5engine.py --ignore=tests/test_e2e_paper_comparison.py

      - name: run unit tests summary
        if: always()
        run: python -m pytest tests/ --ignore=tests/test_e2e_full.py --ignore=tests/test_e2e_5engine.py --ignore=tests/test_e2e_paper_comparison.py --tb=short -q
